# Minimal CI for OmniKB.
#
# Three stages, ordered by signal/cost:
#   1. lint+import-smoke    fast (~30s)  catches broken imports / syntax
#   2. doctor               fast (~45s)  catches env/config drift
#   3. unit                 fast (~60s)  agent_core regression suite
#
# Frontend is intentionally excluded for now — the Tailwind CDN approach
# means there's no compile step to run. When the frontend gets a build
# pipeline (vite/tailwindcss-cli), add a 'frontend' job that runs
# 'node --check' on every js file plus the bundler.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  smoke:
    name: import smoke + doctor
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      USE_TF: "0"
      USE_JAX: "0"
      # Doctor probes /v1/models against this; we use a placeholder so the
      # check runs in --quick mode (no network) but config validation works.
      LLM_API_KEY: "ci-placeholder-key"
      LLM_PROVIDER: "deepseek"
      LLM_MODEL: "deepseek-chat"
      LLM_BASE_URL: "https://api.deepseek.com/v1"
      MCP_API_KEY: "ci-placeholder-mcp-strong-secret"
      QDRANT_MODE: "memory"
      EMBEDDING_PROVIDER: "siliconflow"
      SILICONFLOW_API_KEY: "ci-placeholder-embed-key"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.lock.txt

      - name: System deps (ffmpeg)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python deps (lock)
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r backend/requirements.lock.txt

      - name: Install test runner
        run: pip install pytest pytest-asyncio

      - name: Import smoke
        working-directory: backend
        run: python -c "import main; print('routes', sum(1 for _ in main.app.routes))"

      - name: Doctor (quick, no network)
        working-directory: backend
        run: python -m scripts.doctor --quick --json | tee doctor.json

      - name: Doctor exit code (best-effort)
        working-directory: backend
        # Re-run for the exit code; keep CI green even if doctor reports
        # warnings (e.g. patchright not yet installed). Promote to 'fail on
        # error' once the suite is stable.
        run: python -m scripts.doctor --quick || echo "::warning::doctor reported issues"

  unit:
    name: unit (agent_core)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: smoke
    env:
      USE_TF: "0"
      USE_JAX: "0"
      LLM_API_KEY: "ci-placeholder-key"
      MCP_API_KEY: "ci-placeholder-mcp-strong-secret"
      QDRANT_MODE: "memory"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.lock.txt

      - name: Install Python deps (lock)
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r backend/requirements.lock.txt
          pip install pytest pytest-asyncio

      - name: Run agent_core suite
        run: python -m pytest tests/agent_core -v --tb=short
