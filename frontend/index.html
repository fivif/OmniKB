<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OmniKB</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
  <link rel="apple-touch-icon" sizes="128x128" href="logo-128.png"/>

  <!-- Tailwind CSS CDN (utility classes used by all panels) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#5e6ad2', dark: '#4f5bc1', light: '#818ff0' }
          }
        }
      }
    }
  </script>

  <!-- Theme bootstrap — must run before CSS to prevent flash -->
  <script>
    (function () {
      try {
        var pref = localStorage.getItem('omnikb-theme') || 'system';
        var resolved = pref;
        if (pref === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (resolved === 'dark' && pref !== 'system') {
          document.documentElement.setAttribute('data-theme', 'dark');
        } else if (resolved === 'light' && pref !== 'system') {
          document.documentElement.setAttribute('data-theme', 'light');
        }
        document.documentElement.setAttribute('data-theme-pref', pref);
      } catch (e) {}
    })();
  </script>

  <link rel="stylesheet" href="css/main.css"/>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="omni-layout">

  <!-- ─── Topbar ───────────────────────────────────────────── -->
  <header class="omni-topbar">
    <div class="topbar-left">
      <button class="topbar-burger" id="topbar-burger" aria-label="打开导航" aria-expanded="false" aria-controls="omni-sidebar">
        <i data-lucide="menu"></i>
      </button>
      <div class="topbar-title-block">
        <span class="topbar-eyebrow">Knowledge Console</span>
        <div class="topbar-heading-row">
          <span class="topbar-breadcrumb" id="topbar-breadcrumb">上传与摄入</span>
          <span class="topbar-divider"></span>
          <span class="topbar-subtitle" id="topbar-subtitle">向知识库添加文件、网页和文本内容</span>
        </div>
      </div>
    </div>

    <div class="topbar-right">
      <button class="topbar-status-pill" id="topbar-status-pill" data-tooltip="检查后端连接状态" data-tooltip-pos="bottom" aria-label="检查后端连接状态">
        <span class="topbar-status-dot" id="topbar-status-dot"></span>
        <span class="topbar-status-label" id="topbar-status-label">检测后端</span>
      </button>
      <button class="topbar-icon-btn" id="topbar-theme-btn" data-tooltip="切换主题" data-tooltip-pos="bottom" aria-label="切换主题">
        <i data-lucide="sun-moon"></i>
      </button>
      <button class="topbar-icon-btn" id="topbar-console-btn" data-tooltip="Agent 控制台" data-tooltip-pos="bottom" aria-label="Agent 控制台">
        <i data-lucide="terminal"></i>
      </button>
    </div>
  </header>

  <!-- ─── Body (sidebar + main) ─────────────────────────────── -->
  <div class="omni-body">

    <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

    <aside class="omni-sidebar" id="omni-sidebar">
      <nav class="sidebar-nav">
        <button data-tab="upload" class="nav-btn active">
          <i data-lucide="upload"></i><span>上传</span>
        </button>
        <button data-tab="chat" class="nav-btn">
          <i data-lucide="message-circle"></i><span>对话</span>
        </button>
        <button data-tab="kb" class="nav-btn">
          <i data-lucide="database"></i><span>知识库</span>
        </button>
        <button data-tab="wiki" class="nav-btn">
          <i data-lucide="book-open"></i><span>Wiki</span>
        </button>
        <button data-tab="scenarios" class="nav-btn">
          <i data-lucide="layout-grid"></i><span>问答管理</span>
        </button>
        <button data-tab="settings" class="nav-btn">
          <i data-lucide="settings"></i><span>设置</span>
        </button>
      </nav>
      <div class="sidebar-collapse-wrap">
        <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" aria-label="折叠侧栏" title="折叠侧栏">
          <i data-lucide="chevron-left"></i>
        </button>
      </div>
      <div class="sidebar-footer">
        <div class="sidebar-stat">
          <span>来源</span>
          <span class="sidebar-stat-val" id="stat-sources">—</span>
        </div>
        <div class="sidebar-stat">
          <span>Wiki 页</span>
          <span class="sidebar-stat-val" id="stat-chunks">—</span>
        </div>
        <p class="sidebar-footer-note">Wiki 知识图谱 · Agent 采集 · MCP 出口</p>
      </div>
    </aside>

    <main class="omni-main">
      <section id="tab-upload"    class="tab-panel"></section>
      <section id="tab-chat"      class="tab-panel hidden tab-panel-flex" style="padding:0;"></section>
      <section id="tab-kb"        class="tab-panel hidden"></section>
      <section id="tab-wiki"      class="tab-panel hidden tab-panel-flex" style="padding:0;"></section>
      <section id="tab-scenarios" class="tab-panel hidden tab-panel-flex" style="padding:0;"></section>
      <section id="tab-settings"  class="tab-panel hidden"></section>
    </main>
  </div>

  <!-- Agent Console mounts itself at body end via js/agent-console.js -->
</div>

<!-- Toast container — outside .omni-layout to escape its stacking context so toasts render above the topbar -->
<div id="toast-container" class="toast-container"></div>

<script src="js/theme.js"></script>
<script src="js/app.js"></script>
<script src="js/upload.js"></script>
<script src="js/chat.js?v=4"></script>
<script src="js/kb-manager.js?v=4"></script>
<script src="js/citation-chain.js"></script>
<script src="js/settings.js"></script>
<script src="js/scenario-manager.js?v=9"></script>

<!-- Wiki tab: marked.js for markdown render, D3.js for the force graph.
     Load only AFTER the other tabs so they're not blocked by these CDNs. -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="js/wiki.js?v=7"></script>

<script src="js/agent-console.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.lucide) window.lucide.createIcons();

    // Topbar wiring
    var themeBtn = document.getElementById('topbar-theme-btn');
    if (themeBtn && window.OmniTheme) {
      themeBtn.addEventListener('click', function () { window.OmniTheme.cycle(); });
    }
    var consoleBtn = document.getElementById('topbar-console-btn');
    function toggleConsole() {
      var bar = document.getElementById('agc-bar');
      if (bar) bar.click();
    }
    if (consoleBtn) consoleBtn.addEventListener('click', toggleConsole);

    var statusBtn = document.getElementById('topbar-status-pill');
    if (statusBtn && window.OmniKBApp && typeof window.OmniKBApp.refreshBackendStatus === 'function') {
      statusBtn.addEventListener('click', function () {
        window.OmniKBApp.refreshBackendStatus(true);
      });
    }
  });
</script>
</body>
</html>
